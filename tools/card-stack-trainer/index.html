<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#1a0b3d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Stack Sprint Trainer</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-192.svg">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="app-shell">
    <header class="app-header">
      <div class="header-top">
        <div class="header-title-group">
          <h1>Stack Sprint</h1>
          <p class="subtitle">Train your 52-card stack — both directions.</p>
        </div>
        <div class="streak-chip" id="streakChip">0 🔥</div>
      </div>

      <div class="mastery-bar-wrap">
        <div class="mastery-bar-label">
          <span>Cards mastered</span>
          <span id="masteryText">0 / 52</span>
        </div>
        <div class="mastery-bar-track">
          <div class="mastery-bar-fill" id="masteryFill" style="width:0%"></div>
        </div>
      </div>
    </header>

    <section class="mode-grid" id="modeGrid">
      <button class="mode-card mode-primary" data-mode="number-to-card">
        <span class="mode-icon">🔢</span>
        <span class="mode-title">Position → Card</span>
        <span class="mode-copy">You see a number — name the card at that position.</span>
      </button>
      <button class="mode-card mode-primary" data-mode="card-to-number">
        <span class="mode-icon">🃏</span>
        <span class="mode-title">Card → Position</span>
        <span class="mode-copy">You see a card — name its position in the stack.</span>
      </button>
      <button class="mode-card mode-mixed" data-mode="mixed">
        <span class="mode-icon">🔀</span>
        <span class="mode-title">Mixed Drills</span>
        <span class="mode-copy">Adaptive — focuses on your weakest spots.</span>
      </button>
      <button class="mode-card mode-tool" data-mode="review">
        <span class="mode-icon">📚</span>
        <span class="mode-title">Stack Explorer</span>
        <span class="mode-copy">Flip all 52 cards. Mark ones you know cold.</span>
      </button>
      <button class="mode-card mode-tool" data-mode="stats">
        <span class="mode-icon">📊</span>
        <span class="mode-title">Progress</span>
        <span class="mode-copy">Accuracy, speed, streaks &amp; weak spots.</span>
      </button>
    </section>

    <!-- ── Trainer ── -->
    <section class="trainer hidden" id="trainer">
      <div class="quiz-head">
        <button class="btn-back" id="btnBack">← Back</button>
        <div class="scoreline" id="scoreline">0 / 0 • 0%</div>
      </div>

      <div class="question-card" id="questionCard">
        <div class="question-label" id="questionLabel">Position</div>
        <div class="question-display">
          <div class="question-prefix" id="questionPrefix">#</div>
          <div class="question-value" id="questionValue">17</div>
          <div class="question-suit hidden" id="questionSuit"></div>
        </div>
        <div class="question-timer">⏱ <span id="timerValue">0.0s</span></div>
      </div>

      <form class="answer-form" id="answerForm" autocomplete="off">
        <label id="answerLabel">Select your answer</label>
        <input id="answerInput" type="hidden">

        <!-- Card keypad: shown when answering with a card (number-to-card mode) -->
        <div class="card-keypad" id="cardKeypad">
          <div class="keypad-display" id="cardDisplay">
            <span class="disp-rank" id="dispRank">?</span><span class="disp-suit" id="dispSuit">?</span>
          </div>
          <div class="keypad-ranks">
            <button type="button" class="key-btn rank-btn" data-rank="A">A</button>
            <button type="button" class="key-btn rank-btn" data-rank="2">2</button>
            <button type="button" class="key-btn rank-btn" data-rank="3">3</button>
            <button type="button" class="key-btn rank-btn" data-rank="4">4</button>
            <button type="button" class="key-btn rank-btn" data-rank="5">5</button>
            <button type="button" class="key-btn rank-btn" data-rank="6">6</button>
            <button type="button" class="key-btn rank-btn" data-rank="7">7</button>
            <button type="button" class="key-btn rank-btn" data-rank="8">8</button>
            <button type="button" class="key-btn rank-btn" data-rank="9">9</button>
            <button type="button" class="key-btn rank-btn" data-rank="T">10</button>
            <button type="button" class="key-btn rank-btn" data-rank="J">J</button>
            <button type="button" class="key-btn rank-btn" data-rank="Q">Q</button>
            <button type="button" class="key-btn rank-btn" data-rank="K">K</button>
          </div>
          <div class="keypad-suits">
            <button type="button" class="key-btn suit-btn suit-red" data-suit="H">♥</button>
            <button type="button" class="key-btn suit-btn suit-red" data-suit="D">♦</button>
            <button type="button" class="key-btn suit-btn suit-black" data-suit="C">♣</button>
            <button type="button" class="key-btn suit-btn suit-black" data-suit="S">♠</button>
          </div>
          <button type="button" class="key-clear" id="cardClear">✕  Clear</button>
        </div>

        <!-- Number keypad: shown when answering with a position (card-to-number mode) -->
        <div class="num-keypad hidden" id="numKeypad">
          <div class="keypad-display" id="numDisplay">–</div>
          <div class="keypad-nums">
            <button type="button" class="key-btn num-btn" data-num="1">1</button>
            <button type="button" class="key-btn num-btn" data-num="2">2</button>
            <button type="button" class="key-btn num-btn" data-num="3">3</button>
            <button type="button" class="key-btn num-btn" data-num="4">4</button>
            <button type="button" class="key-btn num-btn" data-num="5">5</button>
            <button type="button" class="key-btn num-btn" data-num="6">6</button>
            <button type="button" class="key-btn num-btn" data-num="7">7</button>
            <button type="button" class="key-btn num-btn" data-num="8">8</button>
            <button type="button" class="key-btn num-btn" data-num="9">9</button>
            <button type="button" class="key-btn num-btn" data-num="0">0</button>
            <button type="button" class="key-btn key-back" id="numBack">⌫</button>
          </div>
          <button type="button" class="key-clear" id="numClear">✕  Clear</button>
        </div>

        <button class="btn-check" type="submit">Check Answer</button>
      </form>

      <div class="feedback hidden" id="feedback"></div>

      <div class="actions-row">
        <button class="btn-action" id="btnReveal" type="button">💡 Reveal</button>
        <button class="btn-action btn-next" id="btnNext" type="button">Next →</button>
      </div>
    </section>

    <!-- ── Stack Explorer ── -->
    <section class="review hidden" id="review">
      <div class="quiz-head">
        <button class="btn-back" id="btnBackReview">← Back</button>
        <h2 class="section-title">Stack Explorer</h2>
      </div>
      <p class="subtitle">Tap to flip. Star cards you know cold.</p>
      <div class="stack-grid" id="stackGrid"></div>
    </section>

    <!-- ── Stats ── -->
    <section class="stats hidden" id="stats">
      <div class="quiz-head">
        <button class="btn-back" id="btnBackStats">← Back</button>
        <h2 class="section-title">Progress</h2>
      </div>
      <div class="stats-grid">
        <article class="stat-card">
          <h3>Attempts</h3>
          <p id="statAttempts">0</p>
        </article>
        <article class="stat-card">
          <h3>Accuracy</h3>
          <p id="statAccuracy">0%</p>
        </article>
        <article class="stat-card">
          <h3>Avg Speed</h3>
          <p id="statSpeed">0.0s</p>
        </article>
        <article class="stat-card">
          <h3>Best Streak</h3>
          <p id="statBestStreak">0</p>
        </article>
      </div>

      <div class="weak-list-wrap">
        <h3 class="weak-list-heading">Focus List</h3>
        <ul id="weakList"></ul>
      </div>

      <button class="btn-reset" id="btnReset">Reset All Stats</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
